<!DOCTYPE HTML>
<html lang="id" style="color-scheme: light;">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us - KAP Ishak Awaluddin</title>
    <meta name="description" content="Hubungi Kantor Akuntan Publik Ishak Awaluddin di Makassar melalui WhatsApp, Telepon, Email, atau kunjungi kantor kami langsung.">
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Instrument Sans', sans-serif; }
        .text-primary { color: #FF6600; }
        .text-accent { color: #FF8B3D; }
        .bg-primary { background-color: #FF6600; }
        .wa-btn { background-color: #25d366; }
        .wa-btn:hover { background-color: #128c7e; }
    </style>
</head>

<body class="font-sans antialiased bg-white" data-active-page="contact">
    <div id="header-container"></div>

    <div style="background: linear-gradient(135deg, #FF6600 0%, #FF8B3D 60%, #FFAF7A 100%);" class="py-16 px-4 sm:px-6 lg:px-8">
        <div class="max-w-screen-xl mx-auto text-center">
            <h1 class="text-4xl md:text-6xl font-bold text-white mb-4">Contact Us</h1>
            <p class="text-white/90 text-lg md:text-xl max-w-2xl mx-auto">Hubungi Kami untuk Layanan Audit dan Konsultasi Keuangan</p>
        </div>
    </div>

    <main class="max-w-screen-xl mx-auto px-4 py-16 sm:px-6 lg:px-8">
        <div class="grid md:grid-cols-2 gap-10">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 mb-6">Informasi Kontak</h2>
                <div class="space-y-6">
                    <div class="flex items-start gap-4">
                        <span class="text-2xl">📍</span>
                        <div>
                            <h3 class="font-semibold text-gray-800">Alamat Kantor</h3>
                            <p class="text-gray-600 text-sm mt-1">Makassar, Sulawesi Selatan, Indonesia</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-4">
                        <span class="text-2xl">📞</span>
                        <div>
                            <h3 class="font-semibold text-gray-800">Telepon / WhatsApp</h3>
                            <p class="text-gray-600 text-sm mt-1">+6282256222154</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-4">
                        <span class="text-2xl">✉️</span>
                        <div>
                            <h3 class="font-semibold text-gray-800">Email</h3>
                            <p class="text-gray-600 text-sm mt-1">kapishak.makassar@gmail.com</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 border border-gray-200 p-8 rounded-2xl">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Kirim Pesan</h2>
                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                        <input type="text" class="mt-1 block w-full px-4 py-2 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" class="mt-1 block w-full px-4 py-2 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Pesan</label>
                        <textarea class="mt-1 block w-full px-4 py-2 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 h-32" required></textarea>
                    </div>
                    <button type="submit" class="w-full py-3 px-4 font-semibold text-white bg-orange-500 rounded-lg hover:bg-orange-600 transition">Kirim Pesan</button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="js/layout.js" defer></script>
</body>
</html>
