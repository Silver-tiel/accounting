<!DOCTYPE HTML>
<html lang="id" style="color-scheme: light;">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery - KAP Ishak Awaluddin</title>
    <meta name="description" content="Dokumentasi kegiatan, kantor, dan acara sosial dari Kantor Akuntan Publik Ishak Awaluddin Makassar.">
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Instrument Sans', sans-serif; }
        .text-primary { color: #FF6600; }
        .text-accent { color: #FF8B3D; }
        .bg-primary { background-color: #FF6600; }
        .wa-btn { background-color: #25d366; }
        .wa-btn:hover { background-color: #128c7e; }
    </style>
</head>

<body class="font-sans antialiased bg-white" data-active-page="gallery">
    <div id="header-container"></div>

    <div style="background: linear-gradient(135deg, #FF6600 0%, #FF8B3D 60%, #FFAF7A 100%);" class="py-16 px-4 sm:px-6 lg:px-8">
        <div class="max-w-screen-xl mx-auto text-center">
            <h1 class="text-4xl md:text-6xl font-bold text-white mb-4">Gallery</h1>
            <p class="text-white/90 text-lg md:text-xl max-w-2xl mx-auto">Dokumentasi Kegiatan dan Aktivitas Profesional Kami</p>
        </div>
    </div>

    <main class="max-w-screen-xl mx-auto px-4 py-16 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <div class="bg-gray-100 aspect-video rounded-xl flex items-center justify-center text-gray-500 border border-gray-200">
                [Dokumentasi Kantor]
            </div>
            <div class="bg-gray-100 aspect-video rounded-xl flex items-center justify-center text-gray-500 border border-gray-200">
                [Audit Lapangan]
            </div>
            <div class="bg-gray-100 aspect-video rounded-xl flex items-center justify-center text-gray-500 border border-gray-200">
                [Pertemuan Klien]
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="js/layout.js" defer></script>
</body>
</html>
